<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- Thakhin OS: make Burmese (Myanmar) render everywhere, including the
     monospace terminal, by adding Padauk / Noto Sans Myanmar to the fallback
     chains. Without this, neofetch / MOTD / thakhin-facts Burmese shows as
     tofu boxes in xfce4-terminal. -->
<fontconfig>

  <!-- Monospace (terminal, neofetch, code): keep a real mono for ASCII,
       fall back to Padauk for Myanmar codepoints (VTE does per-glyph fallback). -->
  <alias binding="strong">
    <family>monospace</family>
    <prefer>
      <family>DejaVu Sans Mono</family>
      <family>Noto Sans Mono</family>
      <family>Padauk</family>
      <family>Noto Sans Myanmar</family>
    </prefer>
  </alias>

  <!-- Sans / serif also fall back to Padauk for Myanmar -->
  <alias binding="strong">
    <family>sans-serif</family>
    <prefer>
      <family>Padauk</family>
      <family>Noto Sans Myanmar</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>serif</family>
    <prefer>
      <family>Padauk</family>
      <family>Noto Serif Myanmar</family>
    </prefer>
  </alias>

  <!-- Any request for Myanmar-language text prefers Padauk (best shaping) -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>my</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Padauk</string></edit>
  </match>

</fontconfig>
