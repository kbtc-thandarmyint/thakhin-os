-- Thakhin OS — immersive desktop widget (မဘသ gold on dark)
conky.config = {
    alignment = 'top_right',
    gap_x = 34,
    gap_y = 64,
    minimum_width = 300,
    maximum_width = 340,
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 170,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_colour = '0d0d0d',
    double_buffer = true,
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    border_inner_margin = 16,
    default_color = 'e9e2c8',
    color1 = 'D4AF37',   -- gold
    color2 = 'FFD700',   -- buddha gold
    color3 = 'FF9933',   -- saffron
    use_xft = true,
    font = 'Padauk:size=10',
    xftalpha = 1.0,
    update_interval = 2.0,
    no_buffers = true,
    uppercase = false,
}

conky.text = [[
${color1}${font Padauk:bold:size=20}☸ သခင် OS${font}${color}
${color2}ဥက္ကဋ္ဌကြီး ဝင်းကိုကိုလတ်${color}
${color3}AnonyLatt ဌာနကြီး${color}
${color1}${hr 2}${color}
${color1}အမျိုးကိုစောင့်၊ ဘာသာကိုစောင့်၊${color}
${color1}သာသနာကိုစောင့် — Data ကိုလည်းစောင့်${color}
${color1}${hr 2}${color}
${color2}System${color}   ${alignr}${sysname} ${machine}
${color2}Kernel${color}   ${alignr}${kernel}
${color2}Uptime${color}   ${alignr}${uptime_short}
${color2}CPU${color} ${cpu}% ${alignr}${freq_g} GHz
${color1}${cpubar 6,300}${color}
${color2}RAM${color} ${mem} / ${memmax} ${alignr}${memperc}%
${color1}${membar 6,300}${color}
${color2}Disk /${color} ${fs_used /} / ${fs_size /} ${alignr}${fs_used_perc /}%
${color1}${fs_bar 6,300 /}${color}
${color2}Net${color} ${alignr}↓${downspeedf eth0}K ↑${upspeedf eth0}K
${color1}${hr 2}${color}
${color3}သိကောင်းစရာ ☸${color}
${color}${font Padauk:size=9}${execpi 1800 thakhin-facts --plain}${font}
${voffset 6}${color1}${font Padauk:size=9}winkokolatt.me | တောသားနှိမ်နင်းရေးအသင်း${font}${color}
]]
